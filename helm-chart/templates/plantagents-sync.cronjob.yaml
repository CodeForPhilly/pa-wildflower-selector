{{- if .Values.plantagentsSync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "helm-chart.fullname" . }}-plantagents-sync
  labels:
    {{- include "helm-chart.labels" . | nindent 4 }}
spec:
  # 07:00 UTC is 3:00 AM EDT and 2:00 AM EST. Kubernetes versions in these
  # clusters do not rely on timeZone, so the UTC schedule remains stable.
  schedule: {{ .Values.plantagentsSync.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.plantagentsSync.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.plantagentsSync.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.plantagentsSync.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "helm-chart.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: plantagents-sync
        spec:
          restartPolicy: Never
          containers:
            - name: plantagents-sync
              image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag | default .Chart.AppVersion }}"
              imagePullPolicy: {{ .Values.app.image.pullPolicy }}
              command: ["npm", "run", "sync:plantagents", "--"]
              env:
                - name: DB_HOST
                  value: {{ include "helm-chart.fullname" . }}
                - name: DB_PORT
                  value: "27017"
                - name: DB_NAME
                  value: {{ .Values.db.name | quote }}
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: mongo
                      key: username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mongo
                      key: password
                - name: PLANTAGENTS_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.plantagentsSync.secretName }}
                      key: PLANTAGENTS_DATABASE_URL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
{{- end }}
